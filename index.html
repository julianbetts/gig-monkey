<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gig Monkey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="dashboard">
    <div class="backdrop"></div>
    <div class="noise"></div>

    <header class="hero">
      <div class="hero-copy">
        <nav class="top-nav" aria-label="Primary">
          <a href="./index.html" class="is-current">Dashboard</a>
          <a href="./setlists.html">Setlists</a>
        </nav>
        <p class="eyebrow">Band Toolkit</p>
        <h1>Gig Monkey</h1>
      </div>

      <div id="auth-panel-root" class="hero-card auth-shell"></div>
    </header>

    <main class="dashboard">
      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Setlist Maker</h2>
          </div>
        </div>

        <div id="dashboard-default-setlist" class="selected-card empty-state">
          <p>No default setlist yet. Create one on the setlists page.</p>
        </div>
        <div class="action-row dashboard-setlist-actions">
          <a href="./setlists.html" class="panel-link">Manage</a>
          <button id="dashboard-print-setlist" type="button" class="ghost-button">
            Print
          </button>
        </div>
      </section>

      <!--
      <section class="panel">
        <div class="panel-heading">
          <div>
            <p class="section-tag">Gig Notes</p>
            <h2>Never forget the details</h2>
          </div>
        </div>

        <form id="gig-note-form" class="stack-form">
          <label>
            Venue or event
            <input
              type="text"
              name="title"

          </label>
          <button type="submit">Add note</button>

        <div id="gig-notes" class="vertical-list"></div>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Scheduler</h2>
          </div>
        </div>

<form id="practice-form" class="stack-form">
  <label>
    Event type
    <select name="type" required>
      <option value="rehearsal">Rehearsal</option>
      <option value="gig">Gig</option>
      <option value="recording">Recording</option>
      <option value="other">Other</option>
    </select>
  </label>

  <label id="practice-other-label" class="hidden">
    Custom event name
    <input
      type="text"
      name="otherLabel"
    />
  </label>

  <div class="field-grid">
    <label>
      Event date
      <input type="date" name="date" required />
    </label>
    <label>
      Time
      <input type="time" name="time" required />
    </label>
  </div>

  <button type="submit">Schedule event</button>
</form>

      </section>

      <section class="panel span-2">
        <div class="panel-heading">
          <div>
            <h2>Calendar</h2>
          </div>
        </div>

        <div id="calendar-months" class="calendar-stack"></div>
        <article id="calendar-event-detail" class="calendar-detail empty-state">
          <p>Tap an event to view its details.</p>
        </article>
      </section>

      <section class="panel span-2">
        <div class="panel-heading">
          <div>
            <h2>Stage Plot Creator</h2>
          </div>
        </div>

        <div class="stage-layout">
          <form id="stage-item-form" class="stack-form compact-form">
            <label id="stage-name-label">
              Member name
              <input
                type="text"
                name="name"
                required
              />
            </label>
            <label>
              Type
              <select name="type">
                <option value="member">Band Member</option>
                <option value="gear">Gear</option>
              </select>
            </label>
            <label id="stage-role-group">
              Role
              <input
                type="text"
                name="role"
              />
            </label>
            <button type="submit">Add to stage</button>
            <button id="print-stage" type="button" class="stage-print-button">Print</button>
            <div class="stage-form-actions">
              <button id="clear-stage-item" type="button" class="stage-erase-button" disabled>
                Erase
              </button>
            </div>
          </form>

          <div class="stage-shell">
            <div class="stage-header">
              <span>Audience</span>
            </div>
            <div id="stage-canvas" class="stage-canvas" aria-label="Stage plot"></div>
          </div>
        </div>
      </section>
    </main>

    <template id="empty-state-template">
      <article class="empty-state">
        <p>Nothing here yet. Add your first item above.</p>
      </article>
    </template>

    <script src="./supabase-config.js"></script>
    <script src="./supabase-config.local.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
