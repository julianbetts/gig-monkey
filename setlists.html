<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gig Monkey Setlists</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="setlists">
    <div class="backdrop"></div>
    <div class="noise"></div>

    <header class="hero interior-hero">
      <div class="hero-copy">
        <nav class="top-nav" aria-label="Primary">
          <a href="./index.html">Dashboard</a>
          <a href="./setlists.html" class="is-current">Setlists</a>
        </nav>
        <h1>Setlist Monkey</h1>
      </div>
      <div id="auth-panel-root" class="hero-card auth-shell"></div>
    </header>

    <main class="dashboard">
      <section class="panel span-2">
        <form id="setlist-form" class="stack-form">
          <input type="hidden" name="setlistId" />
          <div class="field-grid">
            <input type="date" name="date" aria-label="Event date" />
            <input
              type="text"
              name="name"
              placeholder="Setlist name"
              aria-label="Setlist name"
              required
            />
          </div>

          <div class="stack-form setlist-song-group">
            <div id="song-fields" class="song-fields"></div>
          </div>

          <div class="setlist-primary-actions">
            <button id="add-song" type="button" class="ghost-button setlist-matched-button">
              Add
            </button>
            <button id="save-setlist" type="submit" class="setlist-matched-button">Save</button>
          </div>

          <div class="action-row setlist-save-row">
            <button id="cancel-edit" type="button" class="ghost-button hidden">
              Cancel edit
            </button>
          </div>
        </form>
      </section>

      <section class="panel span-2">
        <div class="panel-heading">
          <div>
            <p class="section-tag">Default Setlist</p>
          </div>
        </div>
        <div class="setlist-layout">
          <aside class="setlist-tools">
            <div id="selected-setlist" class="selected-card empty-state">
              <p>Select a setlist to edit, print, delete, or make it the default.</p>
            </div>
            <div class="action-row">
              <button id="set-default-setlist" type="button">Show</button>
              <button id="print-setlist" type="button" disabled>
                Print
              </button>
              <button id="delete-setlist" type="button" class="ghost-button" disabled>
                Delete
              </button>
            </div>
          </aside>
        </div>
      </section>

      <section class="panel span-2">
        <div class="panel-heading">
          <div>
            <p class="section-tag">Setlists</p>
          </div>
        </div>
        <div id="setlists" class="card-grid"></div>
      </section>
    </main>

    <template id="empty-state-template">
      <article class="empty-state">
        <p>Nothing here yet. Add your first item above.</p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
